<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment System Redesign</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: white;
      color: #1E2761;
      line-height: 1.6;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #F5F5F5;
      border-right: 0.5px solid #E0E0E0;
      padding: 2rem 0;
      overflow-y: auto;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }

    .sidebar-header {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: #1E2761;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #999;
      margin: 0;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar button {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: #999;
      transition: all 0.2s;
      font-weight: 400;
    }

    .sidebar button.active {
      background: white;
      color: #0A7BA7;
      font-weight: 500;
    }

    .sidebar button:hover {
      color: #1E2761;
    }

    .main-content {
      margin-left: 280px;
      flex: 1;
      overflow-y: auto;
      padding: 3rem 4rem;
    }

    .content-wrapper {
      max-width: 900px;
    }

    .slide-content {
      animation: slideIn 0.8s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 48px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    h2 {
      font-size: 32px;
      font-weight: 500;
      margin: 0 0 2rem 0;
    }

    h3 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    h4 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
    }

    .subtitle {
      font-size: 24px;
      color: #666666;
      margin: 0 0 3rem 0;
    }

    .intro-text {
      font-size: 16px;
      color: #666666;
      margin: 0 0 2rem 0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
    }

    .card {
      padding: 1.5rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
    }

    .card-small {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
    }

    .card-accent {
      border-left: 3px solid #0A7BA7;
    }

    .card h3 {
      color: #0A7BA7;
      margin: 0 0 1rem 0;
    }

    .card p {
      color: #666666;
      margin: 0;
      font-size: 13px;
    }

    .card-number {
      font-size: 28px;
      font-weight: 500;
      color: #0A7BA7;
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
    }

    .card-desc {
      font-size: 13px;
      color: #666666;
      margin: 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    ul li {
      padding: 0.5rem 0;
      color: #666666;
      font-size: 13px;
    }

    table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }

    th {
      text-align: left;
      padding: 12px 0;
      font-weight: 500;
      color: #1E2761;
      border-bottom: 0.5px solid #E0E0E0;
    }

    td {
      padding: 12px 0;
      border-bottom: 0.5px solid #E0E0E0;
    }

    tr:nth-child(even) {
      background: #F5F5F5;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .detail-item {
      padding: 0.75rem;
      background: #F5F5F5;
      border: 0.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
    }

    .flow-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .flow-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0A7BA7;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      flex-shrink: 0;
    }

    .flow-content {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      flex: 1;
      font-size: 14px;
    }

    .flow-insight {
      font-size: 13px;
      color: #666666;
      margin-top: 2rem;
      font-style: italic;
    }

    .endpoint-item {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      display: grid;
      grid-template-columns: 80px 1fr 250px;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .endpoint-method {
      font-size: 12px;
      font-weight: 500;
      color: #27AE60;
      background: white;
      padding: 0.5rem;
      border-radius: 4px;
      text-align: center;
    }

    .endpoint-path {
      font-size: 12px;
      color: #1E2761;
      font-family: monospace;
    }

    .endpoint-desc {
      font-size: 13px;
      color: #666666;
      text-align: right;
    }

    code {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 0.5px solid #E0E0E0;
    }

    .button {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border: none;
      transition: all 0.2s;
    }

    .button-secondary {
      background: white;
      border: 0.5px solid #E0E0E0;
      color: #1E2761;
    }

    .button-secondary:hover {
      background: #F5F5F5;
    }

    .button-primary {
      background: #0A7BA7;
      color: white;
    }

    .button-primary:hover {
      background: #085A7D;
    }

    .page-counter {
      font-size: 13px;
      color: #999;
    }

    .text-success {
      color: #27AE60;
    }

    .text-danger {
      color: #E24B4A;
    }

    .text-info {
      color: #0A7BA7;
    }

    .text-secondary {
      color: #666666;
    }

    .pre-text {
      padding: 1.5rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
      font-size: 14px;
      color: #666666;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .summary-box {
      padding: 2rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
      text-align: center;
    }

    .summary-box p {
      font-size: 16px;
      font-weight: 500;
      color: #0A7BA7;
      margin: 0;
    }

    .risk-item {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .risk-title {
      font-weight: 500;
      color: #E24B4A;
      font-size: 13px;
    }

    .risk-mitigation {
      color: #666666;
      font-size: 13px;
    }

    .timeline-item {
      padding: 1.25rem;
      background: #F5F5F5;
      border-radius: 8px;
      border-left: 4px solid #0A7BA7;
      display: grid;
      grid-template-columns: 150px 100px 1fr;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1.25rem;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #E0E0E0;
      border-radius: 3px;
    }

    .main-content::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: #E0E0E0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Payment System</h1>
        <p>Redesign 2026</p>
      </div>
      <nav id="nav-list"></nav>
    </div>

    <div class="main-content">
      <div class="content-wrapper">
        <div id="slide-content" class="slide-content"></div>
        <div class="footer">
          <button class="button button-secondary" onclick="previousSlide()">← Previous</button>
          <span class="page-counter"><span id="current-page">1</span> / <span id="total-pages">1</span></span>
          <button class="button button-primary" onclick="nextSlide()">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const slides = [
      {
        id: "title",
        title: "Payment System Redesign",
        subtitle: "Solving duplicate orders, lost payments & unsafe cancellation",
        type: "title",
        details: ["Duplicate order prevention", "Konbini payment recovery", "Payment cancel & switch", "Auto-refresh payment status"]
      },
      {
        id: "problems",
        title: "Current Problems",
        type: "list",
        intro: "6 issues in today's payment system",
        items: [
          { num: "1", title: "Duplicate orders", desc: "User can create multiple pending orders for same item" },
          { num: "2", title: "Lost konbini info", desc: "If user closes page, payment code is gone forever" },
          { num: "3", title: "No resume flow", desc: "User cannot continue an unfinished payment" },
          { num: "4", title: "Unsafe cancel", desc: "Cancel only updates DB, does NOT call Stripe/PayPay API" },
          { num: "5", title: "Manual refresh", desc: "UI does not auto-update after payment" },
          { num: "6", title: "Race condition", desc: "Payment can succeed after cancel, causing inconsistency" }
        ]
      },
      {
        id: "overview",
        title: "Before vs After Overview",
        type: "table",
        rows: [
          ["Order creation", "Order + payment together", "Order first, payment separate"],
          ["Duplicate check", "None", "Pending order check before purchase"],
          ["Konbini close", "Code lost forever", "Voucher URL stored in DB"],
          ["Resume payment", "Not possible", "Dialog shows resume option"],
          ["Cancel payment", "DB update only", "API call to Stripe/PayPay"],
          ["Switch method", "Not possible", "Cancel old + create new"],
          ["Payment status", "Manual refresh needed", "Auto-polling (5-30 sec)"]
        ]
      },
      {
        id: "order-flow",
        title: "Order Flow Comparison",
        type: "two-col",
        left: { title: "BEFORE", items: ["User clicks Buy", "Create order + payment together", "Redirect to provider", "No check for existing orders", "Opening modal = orphan order"] },
        right: { title: "AFTER", items: ["User clicks Buy", "Check: pending order?", "YES: show dialog | NO: create order", "User picks method", "Create payment session only then"] }
      },
      {
        id: "cancel-flow",
        title: "Cancel Flow Comparison",
        type: "two-col",
        left: { title: "BEFORE", items: ["User cancels", "DB status → FAILED", "Stripe/PayPay NOT notified", "Provider may still collect money", "No cleanup"] },
        right: { title: "AFTER", items: ["User cancels", "Call provider API first", "If success → update DB", "If fail → DON'T update", "Cleanup coupon & lock"] }
      },
      {
        id: "konbini",
        title: "Konbini Payment Recovery",
        type: "two-col",
        left: { title: "THE PROBLEM", items: ["User picks konbini", "Sees payment code", "Closes browser", "Code is LOST", "Can't pay at store", "Order stuck 3 days"] },
        right: { title: "THE SOLUTION", items: ["Webhook stores URL in DB", "User closes browser", "Comes back next day", "System shows pending", "View payment instructions", "Sees code again → Pays ✓"] }
      },
      {
        id: "principles",
        title: "Core Design Principles",
        type: "principles",
        items: [
          { num: "1", title: "Order = Single Truth", desc: "Payment sessions are disposable, order persists" },
          { num: "2", title: "One Pending Order", desc: "Check before creating new orders" },
          { num: "3", title: "Webhook Authority", desc: "Frontend never writes status" },
          { num: "4", title: "Payments Replaceable", desc: "Cancel old, create new, same order ID" },
          { num: "5", title: "Always Cancel Via API", desc: "Never just update database" },
          { num: "6", title: "Store Async Details", desc: "So user can resume (voucher URL, expiry)" }
        ]
      },
      {
        id: "unified-flow",
        title: "Unified Payment Flow",
        type: "flow",
        steps: [
          "POST /api/orders → Create order (PREPARED)",
          "POST /api/orders/{id}/pay → Create payment session (PENDING)",
          "User pays → Stripe / PayPay / Konbini",
          "Webhook confirms → SUCCESS or FAILED",
          "Frontend polls & updates → Auto-redirect"
        ]
      },
      {
        id: "cancel-switch",
        title: "Cancel & Switch Payment Method",
        type: "two-col",
        left: { title: "USER SCENARIO", items: ["User starts PayPay", "Decides wants Stripe", "Clicks Cancel & Choose", "Backend calls PayPay API", "Order → PREPARED", "New Stripe session created"] },
        right: { title: "PROVIDER SUPPORT", items: ["PayPay: cancelPayment()", "Already implemented", "", "Stripe: sessions→expire()", "paymentIntents→cancel()", "Both ready to use"] }
      },
      {
        id: "race-condition",
        title: "Race Condition Handling",
        type: "text",
        content: "Most dangerous edge case: payment succeeds after cancel\n\nT=0: User gets konbini voucher\nT=1: User goes to store\nT=2: User cancels from phone\nT=3: User pays at store\nT=4: Webhook: payment succeeded\n\nSOLUTION: Cancel API may fail → if it fails, DON'T update status. Webhook always takes priority. Rule: If money was collected, always honor it."
      },
      {
        id: "state-machine",
        title: "State Machine",
        type: "text",
        content: "Order Status Transitions:\n\nPREPARED → PENDING → SUCCESS (terminal)\n              ↓\n           FAILED (terminal)\n\nSpecial transitions:\n• PENDING → PREPARED (switch method, same order)\n• PENDING → CANCELLED (user abandons)\n• CANCELLED → SUCCESS (race condition, honor payment)\n\nKey Rules:\n• FAILED = terminal (create new order to retry)\n• CANCELLED → SUCCESS = rare but must be handled\n• PENDING → PREPARED = \"switch method\" transition"
      },
      {
        id: "api-endpoints",
        title: "New API Endpoints",
        type: "endpoints",
        items: [
          { method: "GET", path: "/api/orders/pending", desc: "Check pending order" },
          { method: "POST", path: "/api/orders", desc: "Create order" },
          { method: "GET", path: "/api/orders/{id}/status", desc: "Poll status" },
          { method: "POST", path: "/api/orders/{id}/pay", desc: "Create payment session" },
          { method: "POST", path: "/api/orders/{id}/cancel-payment", desc: "Cancel payment" }
        ]
      },
      {
        id: "frontend",
        title: "Two New Frontend Components",
        type: "two-col",
        left: { title: "PendingOrderDialog", items: ["Shown when user clicks Buy", "If pending order exists:", "  • Resume Payment option", "  • View Status option", "  • Cancel & New Method", "Prevents duplicate creation"] },
        right: { title: "/payment/:orderId Page", items: ["Dedicated status hub", "Auto-polls for confirmation", "Shows konbini voucher link", "Shows expiry countdown", "Can be bookmarked", "Auto-redirects on success"] }
      },
      {
        id: "refresh",
        title: "Auto-Refresh Strategy",
        type: "refresh-table",
        items: [
          { context: "Card / PayPay", interval: "5 sec", duration: "10 min" },
          { context: "Konbini", interval: "30 sec", duration: "Until close" },
          { context: "Payment page", interval: "10 sec", duration: "Until close" }
        ]
      },
      {
        id: "benefits",
        title: "Benefits of Proposed Solution",
        type: "benefits",
        sections: [
          { title: "For Users", items: ["Never lose konbini code", "Switch payment method", "Auto-updating status", "Clear feedback on orders"] },
          { title: "For Business", items: ["No duplicate orders", "No lost payments", "Safe cancellations", "Proper race handling"] },
          { title: "For Developers", items: ["One unified flow", "Clear state machine", "Idempotent webhooks", "Code reused"] }
        ]
      },
      {
        id: "pros-cons",
        title: "Pros & Cons",
        type: "pros-cons",
        pros: ["Solves all 6 problems", "Backward compatible", "No new infrastructure", "Stripe page for Konbini", "PayPay cancel ready", "Simple polling", "No Permission changes"],
        cons: ["5 new API endpoints", "New /payment/:orderId page", "Polling overhead", "Migration period complexity", "Race condition review", "State machine training needed"]
      },
      {
        id: "timeline",
        title: "Implementation Timeline",
        type: "timeline",
        phases: [
          { name: "Phase 1: Foundation", weeks: "Week 1-2", items: "DB migration, OrderService, endpoints, tests" },
          { name: "Phase 2: Konbini Recovery", weeks: "Week 3", items: "Webhook, pending check, testing" },
          { name: "Phase 3: Frontend", weeks: "Week 4-5", items: "Dialog, page, modal fix, flows" },
          { name: "Phase 4: Polish & Launch", weeks: "Week 6", items: "Polling, QA, staging, monitoring" },
          { name: "Phase 5: Cleanup", weeks: "Week 7+", items: "Deprecate, remove flag" }
        ]
      },
      {
        id: "risks",
        title: "Risks & Mitigation",
        type: "risks",
        items: [
          { risk: "Race condition", mit: "Cancel first, webhook priority, log alert" },
          { risk: "Duplicate payments", mit: "Cancel existing before new" },
          { risk: "Konbini expires", mit: "Webhook marks FAILED, show countdown" },
          { risk: "Webhook fails", mit: "3-day retry + safety net" },
          { risk: "Coupon double-use", mit: "Unlink on cancel" },
          { risk: "Migration break", mit: "Keep old endpoints, feature flag" }
        ]
      },
      {
        id: "summary",
        title: "Summary",
        type: "summary",
        problems: [
          "Duplicate orders → pending check blocks",
          "Lost konbini → URL in DB",
          "Unsafe cancel → always via API"
        ],
        philosophy: [
          "Order is permanent, payments disposable",
          "Webhook is the only truth",
          "If money collected, always honor it"
        ],
        closing: "Timeline: ~6 weeks  •  Risk: Low"
      }
    ];

    let currentSlide = 0;

    function renderSlide(index) {
      const slide = slides[index];
      const contentDiv = document.getElementById('slide-content');
      
      let html = '';

      if (slide.type === 'title') {
        html = `
          <h1>${slide.title}</h1>
          <p class="subtitle">${slide.subtitle}</p>
          <div class="details-grid">
            ${slide.details.map(d => `<div class="detail-item">✓ ${d}</div>`).join('')}
          </div>
        `;
      } else if (slide.type === 'list') {
        html = `
          <h2>${slide.title}</h2>
          <p class="intro-text">${slide.intro}</p>
          <div class="grid-2">
            ${slide.items.map(item => `
              <div class="card">
                <div class="card-number">${item.num}</div>
                <h3 style="color: #1E2761; font-size: 16px; margin: 0 0 0.5rem 0;">${item.title}</h3>
                <p>${item.desc}</p>
              </div>
            `).join('')}
          </div>
        `;
      } else if (slide.type === 'table') {
        html = `
          <h2>${slide.title}</h2>
          <table>
            <thead>
              <tr>
                <th>Area</th>
                <th>Before</th>
                <th>After</th>
              </tr>
            </thead>
            <tbody>
              ${slide.rows.map(row => `
                <tr>
                  <td>${row[0]}</td>
                  <td class="text-secondary">${row[1]}</td>
                  <td class="text-secondary">${row[2]}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } else if (slide.type === 'two-col') {
        html = `
          <h2>${slide.title}</h2>
          <div class="grid-2">
            <div class="card">
              <h3>${slide.left.title}</h3>
              <ul>
                ${slide.left.items.map(item => `<li>• ${item}</li>`).join('')}
              </ul>
            </div>
            <div class="card">
              <h3>${slide.right.title}</h3>
              <ul>
                ${slide.right.items.map(item => `<li>• ${item}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      } else if (slide.type === 'principles') {
        html = `
          <h2>${slide.title}</h2>
          <div class="grid-2">
            ${slide.items.map(item => `
              <div class="card card-accent">
                <h4 class="text-info">${item.num}. ${item.title}</h4>
                <p>${item.desc}</p>
              </div>
            `).join('')}
          </div>
        `;
      } else if (slide.type === 'flow') {
        html = `
          <h2>${slide.title}</h2>
          <div>
            ${slide.steps.map((step, i) => `
              <div class="flow-step">
                <div class="flow-number">${i + 1}</div>
                <div class="flow-content">${step}</div>
              </div>
            `).join('')}
          </div>
          <p class="flow-insight">Key insight: Order created ONCE, payment can be attempted multiple times</p>
        `;
      } else if (slide.type === 'endpoints') {
        html = `
          <h2>${slide.title}</h2>
          <div>
            ${slide.items.map(item => `
              <div class="endpoint-item">
                <span class="endpoint-method">${item.method}</span>
                <span class="endpoint-path">${item.path}</span>
                <span class="endpoint-desc">${item.desc}</span>
              </div>
            `).join('')}
          </div>
          <p style="font-size: 12px; color: #666; font-style: italic;">Old endpoints kept for backward compatibility, deprecated gradually</p>
        `;
      } else if (slide.type === 'refresh-table') {
        html = `
          <h2>${slide.title}</h2>
          <table>
            <thead>
              <tr>
                <th>Context</th>
                <th>Poll Interval</th>
                <th>Max Duration</th>
              </tr>
            </thead>
            <tbody>
              ${slide.items.map(item => `
                <tr>
                  <td>${item.context}</td>
                  <td class="text-info">${item.interval}</td>
                  <td class="text-secondary">${item.duration}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <p style="font-size: 13px; color: #666;">On status change: SUCCESS → redirect | FAILED → show error | CANCELLED → home</p>
        `;
      } else if (slide.type === 'benefits') {
        html = `
          <h2>${slide.title}</h2>
          <div class="grid-3">
            ${slide.sections.map(section => `
              <div class="card">
                <h3>${section.title}</h3>
                <ul>
                  ${section.items.map(item => `<li>✓ ${item}</li>`).join('')}
                </ul>
              </div>
            `).join('')}
          </div>
        `;
      } else if (slide.type === 'pros-cons') {
        html = `
          <h2>${slide.title}</h2>
          <div class="grid-2">
            <div>
              <h3 class="text-success">Pros</h3>
              <ul>
                ${slide.pros.map(p => `<li>+ ${p}</li>`).join('')}
              </ul>
            </div>
            <div>
              <h3 class="text-info">Cons</h3>
              <ul>
                ${slide.cons.map(c => `<li>- ${c}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      } else if (slide.type === 'timeline') {
        html = `
          <h2>${slide.title}</h2>
          <div>
            ${slide.phases.map(phase => `
              <div class="timeline-item">
                <h4>${phase.name}</h4>
                <span style="font-size: 12px; font-weight: 500; color: #0A7BA7;">${phase.weeks}</span>
                <p style="margin: 0; font-size: 13px; color: #666;">${phase.items}</p>
              </div>
            `).join('')}
          </div>
        `;
      } else if (slide.type === 'risks') {
        html = `
          <h2>${slide.title}</h2>
          <div>
            ${slide.items.map(item => `
              <div class="risk-item">
                <div class="risk-title">${item.risk}</div>
                <div class="risk-mitigation">${item.mit}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (slide.type === 'summary') {
        html = `
          <h1>${slide.title}</h1>
          <div style="margin-bottom: 2.5rem;">
            <h3>3 Problems Solved</h3>
            <ul>
              ${slide.problems.map(p => `<li>✓ ${p}</li>`).join('')}
            </ul>
          </div>
          <div style="margin-bottom: 2.5rem;">
            <h3>Design Philosophy</h3>
            <ul>
              ${slide.philosophy.map(p => `<li>• ${p}</li>`).join('')}
            </ul>
          </div>
          <div class="summary-box">
            <p>${slide.closing}</p>
          </div>
        `;
      } else {
        html = `
          <h2>${slide.title}</h2>
          <div class="pre-text">${slide.content}</div>
        `;
      }

      contentDiv.innerHTML = html;
      document.getElementById('current-page').textContent = index + 1;
      document.getElementById('total-pages').textContent = slides.length;

      // Update active nav button
      document.querySelectorAll('#nav-list button').forEach((btn, i) => {
        if (i === index) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    function initNav() {
      const navList = document.getElementById('nav-list');
      slides.forEach((slide, i) => {
        const btn = document.createElement('button');
        btn.textContent = slide.title;
        btn.onclick = () => {
          currentSlide = i;
          renderSlide(i);
        };
        if (i === 0) btn.classList.add('active');
        navList.appendChild(btn);
      });
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
        document.querySelector('.sidebar').scrollTop = currentSlide * 46;
      }
    }

    function previousSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
        document.querySelector('.sidebar').scrollTop = currentSlide * 46;
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        previousSlide();
      }
    });

    // Initialize
    initNav();
    renderSlide(0);
  </script>
</body>
</html>
