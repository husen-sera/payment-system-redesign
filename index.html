<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment System Redesign</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: white;
      color: #1E2761;
      line-height: 1.6;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #F5F5F5;
      border-right: 0.5px solid #E0E0E0;
      padding: 2rem 0;
      overflow-y: auto;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }

    .sidebar-header {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: #1E2761;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #999;
      margin: 0;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar button {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: #999;
      transition: all 0.2s;
      font-weight: 400;
    }

    .sidebar button.active {
      background: white;
      color: #0A7BA7;
      font-weight: 500;
    }

    .sidebar button:hover {
      color: #1E2761;
    }

    .main-content {
      margin-left: 280px;
      flex: 1;
      overflow-y: auto;
      padding: 3rem 4rem;
    }

    .content-wrapper {
      max-width: 900px;
    }

    .slide-content {
      animation: slideIn 0.8s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 48px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    h2 {
      font-size: 32px;
      font-weight: 500;
      margin: 0 0 2rem 0;
    }

    h3 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    h4 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
    }

    .subtitle {
      font-size: 24px;
      color: #666666;
      margin: 0 0 2rem 0;
    }

    .intro-text {
      font-size: 16px;
      color: #666666;
      margin: 0 0 2rem 0;
    }

    .meta-info {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      font-size: 13px;
      color: #999;
    }

    .meta-info span {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
    }

    .card {
      padding: 1.5rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
    }

    .card-accent {
      border-left: 3px solid #0A7BA7;
    }

    .card h3 {
      color: #0A7BA7;
      margin: 0 0 1rem 0;
    }

    .card p {
      color: #666666;
      margin: 0;
      font-size: 13px;
    }

    .card-number {
      font-size: 28px;
      font-weight: 500;
      color: #0A7BA7;
      margin-bottom: 0.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    ul li {
      padding: 0.5rem 0;
      color: #666666;
      font-size: 13px;
    }

    table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }

    th {
      text-align: left;
      padding: 12px 8px;
      font-weight: 500;
      color: #1E2761;
      border-bottom: 0.5px solid #E0E0E0;
    }

    td {
      padding: 12px 8px;
      border-bottom: 0.5px solid #E0E0E0;
    }

    tr:nth-child(even) {
      background: #F5F5F5;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .detail-item {
      padding: 0.75rem;
      background: #F5F5F5;
      border: 0.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
    }

    .flow-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .flow-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0A7BA7;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      flex-shrink: 0;
    }

    .flow-content {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      flex: 1;
      font-size: 14px;
    }

    .flow-insight {
      font-size: 13px;
      color: #666666;
      margin-top: 2rem;
      font-style: italic;
    }

    .endpoint-item {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      display: grid;
      grid-template-columns: 80px 1fr 250px;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .endpoint-method {
      font-size: 12px;
      font-weight: 500;
      color: #27AE60;
      background: white;
      padding: 0.5rem;
      border-radius: 4px;
      text-align: center;
    }

    .endpoint-path {
      font-size: 12px;
      color: #1E2761;
      font-family: monospace;
    }

    .endpoint-desc {
      font-size: 13px;
      color: #666666;
      text-align: right;
    }

    code {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 0.5px solid #E0E0E0;
    }

    .button {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border: none;
      transition: all 0.2s;
    }

    .button-secondary {
      background: white;
      border: 0.5px solid #E0E0E0;
      color: #1E2761;
    }

    .button-secondary:hover {
      background: #F5F5F5;
    }

    .button-primary {
      background: #0A7BA7;
      color: white;
    }

    .button-primary:hover {
      background: #085A7D;
    }

    .page-counter {
      font-size: 13px;
      color: #999;
    }

    .text-success {
      color: #27AE60;
    }

    .text-danger {
      color: #E24B4A;
    }

    .text-info {
      color: #0A7BA7;
    }

    .text-secondary {
      color: #666666;
    }

    .pre-text {
      padding: 1.5rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
      font-size: 13px;
      font-family: 'Monaco', 'Courier New', monospace;
      color: #666666;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .summary-box {
      padding: 2rem;
      background: #F5F5F5;
      border-radius: 12px;
      border: 0.5px solid #E0E0E0;
      text-align: center;
    }

    .summary-box p {
      font-size: 16px;
      font-weight: 500;
      color: #0A7BA7;
      margin: 0;
    }

    .risk-item {
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      display: grid;
      grid-template-columns: 160px 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .risk-title {
      font-weight: 500;
      color: #E24B4A;
      font-size: 13px;
    }

    .risk-impact {
      color: #999;
      font-size: 13px;
    }

    .risk-mitigation {
      color: #666666;
      font-size: 13px;
    }

    .timeline-item {
      padding: 1.25rem;
      background: #F5F5F5;
      border-radius: 8px;
      border-left: 4px solid #0A7BA7;
      margin-bottom: 1.25rem;
    }

    .timeline-item h4 {
      margin-bottom: 0.25rem;
    }

    .timeline-weeks {
      font-size: 12px;
      font-weight: 500;
      color: #0A7BA7;
      margin-bottom: 0.5rem;
    }

    .timeline-details {
      font-size: 13px;
      color: #666;
      margin: 0;
    }

    .timeline-details li {
      padding: 0.25rem 0;
    }

    .gantt-chart {
      padding: 1.5rem;
      background: #1E2761;
      border-radius: 12px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #ccc;
      white-space: pre;
      line-height: 1.6;
      overflow-x: auto;
    }

    .gantt-chart .bar {
      color: #0A7BA7;
    }

    .gantt-chart .label {
      color: #fff;
    }

    .scenario-timeline {
      position: relative;
      padding-left: 2rem;
      border-left: 2px solid #E0E0E0;
    }

    .scenario-step {
      position: relative;
      padding: 0.75rem 0 0.75rem 1.5rem;
      font-size: 14px;
      color: #666;
    }

    .scenario-step::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #0A7BA7;
      border: 2px solid white;
      margin-left: -1px;
    }

    .scenario-step.highlight {
      color: #0A7BA7;
      font-weight: 500;
    }

    .scenario-step.success {
      color: #27AE60;
      font-weight: 500;
    }

    .scenario-step.success::before {
      background: #27AE60;
    }

    .scenario-result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      font-size: 14px;
      font-weight: 500;
      color: #0A7BA7;
    }

    .changes-section {
      margin-bottom: 2rem;
    }

    .changes-section h3 {
      margin-bottom: 0.75rem;
    }

    .changes-section li {
      padding: 0.4rem 0;
      font-size: 13px;
      color: #666;
    }

    .file-row {
      padding: 0.75rem 1rem;
      background: #F5F5F5;
      border-radius: 8px;
      border: 0.5px solid #E0E0E0;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 1rem;
      margin-bottom: 0.75rem;
      align-items: center;
    }

    .file-name {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #0A7BA7;
      font-weight: 500;
    }

    .file-purpose {
      font-size: 13px;
      color: #666;
    }

    .diagram-link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #0A7BA7;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .diagram-link:hover {
      background: #085A7D;
    }

    .section-divider {
      margin: 2rem 0;
      border: none;
      border-top: 0.5px solid #E0E0E0;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #E0E0E0;
      border-radius: 3px;
    }

    .main-content::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: #E0E0E0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Payment System</h1>
        <p>Redesign 2026</p>
      </div>
      <nav id="nav-list"></nav>
    </div>

    <div class="main-content">
      <div class="content-wrapper">
        <div id="slide-content" class="slide-content"></div>
        <div class="footer">
          <button class="button button-secondary" onclick="previousSlide()">&larr; Previous</button>
          <span class="page-counter"><span id="current-page">1</span> / <span id="total-pages">1</span></span>
          <button class="button button-primary" onclick="nextSlide()">Next &rarr;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const slides = [
      {
        id: "title",
        title: "Payment System Redesign",
        subtitle: "Solving duplicate orders, lost payments & unsafe cancellation",
        type: "title",
        details: ["Duplicate order prevention", "Konbini payment recovery", "Payment cancel & switch", "Auto-refresh payment status"],
        meta: { date: "2026-04-15", status: "Draft / Discussion", team: "Backend (Laravel) + Frontend (React)" }
      },
      {
        id: "problems",
        title: "Current Problems",
        type: "list",
        intro: "6 issues in today's payment system",
        items: [
          { num: "1", title: "Duplicate orders", desc: "User can create multiple pending orders for the same item" },
          { num: "2", title: "Lost konbini info", desc: "If user closes page, payment code is gone forever" },
          { num: "3", title: "No resume flow", desc: "User cannot continue an unfinished payment" },
          { num: "4", title: "Unsafe cancel", desc: "Cancel only updates DB, does NOT call Stripe/PayPay API" },
          { num: "5", title: "Manual refresh", desc: "UI does not auto-update after payment" },
          { num: "6", title: "Race condition", desc: "Payment can succeed after cancel, causing data inconsistency" }
        ]
      },
      {
        id: "overview",
        title: "Before vs After Overview",
        type: "table",
        rows: [
          ["Order creation", "Order + payment created together", "Order first, payment separate"],
          ["Duplicate check", "None", "Pending order check before every purchase"],
          ["Konbini page close", "Payment code lost forever", "Voucher URL stored in DB, accessible anytime"],
          ["Resume payment", "Not possible", "Dialog shows resume option"],
          ["Cancel payment", "DB update only", "API call to Stripe/PayPay"],
          ["Switch method", "Not possible", "Cancel old + create new (same order)"],
          ["Payment status", "Manual refresh needed", "Auto-polling (5-30 sec)"],
          ["PayPay modal", "Creates order on modal open", "Creates order only on button click"]
        ]
      },
      {
        id: "order-flow",
        title: "Order Flow Comparison",
        type: "two-col",
        left: { title: "BEFORE", items: ["User clicks \"Buy\"", "Create order + payment session together", "Redirect to provider", "No check for existing orders", "Opening payment modal = orphan PayPay order"] },
        right: { title: "AFTER", items: ["User clicks \"Buy\"", "Check: pending order for same item?", "YES: show resume/cancel dialog", "NO: create order (PREPARED)", "User picks method \u2192 create payment session (PENDING)", "Payment only created when user clicks button"] }
      },
      {
        id: "cancel-flow",
        title: "Cancel Flow Comparison",
        type: "two-col",
        left: { title: "BEFORE", items: ["User cancels", "DB status updated to FAILED", "Stripe/PayPay NOT notified", "Provider may still collect money", "No cleanup of coupon/lock"] },
        right: { title: "AFTER", items: ["User cancels", "Call provider cancel API first", "If API succeeds \u2192 update DB status", "If API fails \u2192 DON'T update DB (payment in progress)", "Cleanup: coupon unlinked, Redis lock cleared", "Webhook remains final authority"] }
      },
      {
        id: "konbini",
        title: "Konbini Payment Recovery",
        type: "two-col",
        left: { title: "BEFORE", items: ["User picks konbini \u2192 sees payment code on Stripe page", "Closes browser", "Payment code LOST", "Can't pay at store", "Order stuck PENDING for 3 days", "Expires \u2192 user must start over"] },
        right: { title: "AFTER", items: ["User picks konbini \u2192 sees payment code", "Webhook stores voucher URL in DB", "User closes browser", "Comes back next day", "System shows: \"Pending payment (expires Apr 18)\"", "Clicks \"View Payment Instructions\"", "Sees payment code again \u2192 pays at store \u2192 SUCCESS"] }
      },
      {
        id: "principles",
        title: "Core Design Principles",
        type: "principles",
        intro: "6 rules that guide the redesign",
        items: [
          { num: "1", title: "Order = Single Source of Truth", desc: "Payment sessions are disposable, order persists" },
          { num: "2", title: "One Pending Order Per User Per Item", desc: "Check before creating new" },
          { num: "3", title: "Webhook = Only Trusted Status Source", desc: "Frontend never writes status" },
          { num: "4", title: "Payments Are Replaceable", desc: "Cancel old session, create new one, same order ID" },
          { num: "5", title: "Always Cancel Via Provider API", desc: "Never just update database" },
          { num: "6", title: "Store Async Payment Details", desc: "So user can resume (konbini voucher URL, expiry)" }
        ]
      },
      {
        id: "workflow-diagram",
        title: "Visual Workflow Diagram",
        type: "flow",
        intro: "New payment flow at a glance",
        steps: [
          "Buy \u2192 Pending check",
          "[No pending] \u2192 Create order (PREPARED)",
          "Pick payment method \u2192 Create session (PENDING)",
          "User pays \u2192 Webhook confirms",
          "[Has pending] \u2192 Resume / Cancel & Switch dialog"
        ],
        insight: "Interactive diagrams available: Main User Flow, Order State Machine, Konbini Recovery Flow, Cancel & Switch Method, Pages & Components Architecture",
        link: { url: "payment-flow-diagram.html", label: "Open Interactive Diagrams" }
      },
      {
        id: "unified-flow",
        title: "Unified Payment Flow",
        type: "flow",
        intro: "Both Stripe and PayPay share ONE flow",
        steps: [
          "POST /api/orders \u2192 Create order (PREPARED)",
          "POST /api/orders/{id}/pay \u2192 Create payment session (PENDING)",
          "User pays \u2192 Stripe / PayPay / Konbini",
          "Webhook confirms \u2192 SUCCESS or FAILED",
          "Frontend polls & updates \u2192 Auto-redirect to success"
        ],
        insight: "Key insight: Order created ONCE, payment can be attempted multiple times"
      },
      {
        id: "pending-check",
        title: "Pending Order Check Flow",
        type: "text",
        intro: "What happens when user clicks \"Buy\"",
        content: "User clicks \"Buy\"\n    |\n    v\nCheck pending order (same user + same item)\n    |\n    +-- No pending \u2192 open payment method selector\n    |\n    +-- Has pending \u2192 show dialog:\n        |\n        +-- \"Resume Payment\" (open voucher / PayPay)\n        +-- \"View Status\" (go to /payment/:orderId)\n        +-- \"Cancel & New Method\" (cancel API \u2192 new payment)\n\nPrevents duplicate orders automatically"
      },
      {
        id: "cancel-switch",
        title: "Cancel & Switch Payment Method",
        type: "flow",
        intro: "User started PayPay, wants Stripe instead",
        steps: [
          "User clicks \"Cancel & Choose New Method\"",
          "Backend calls PayPay cancelPayment() API",
          "Order status \u2192 PREPARED (not FAILED \u2014 order still valid)",
          "User picks Stripe \u2192 new Stripe session created",
          "Same order ID, different payment session"
        ],
        insight: "Both providers support cancellation: PayPay cancelPayment() (already implemented) | Stripe sessions\u2192expire() + paymentIntents\u2192cancel()"
      },
      {
        id: "race-condition",
        title: "Race Condition Handling",
        type: "text",
        intro: "Most dangerous edge case: payment succeeds after cancel",
        content: "T=0  User gets konbini voucher\nT=1  User goes to convenience store\nT=2  Meanwhile, user cancels from phone\nT=3  User pays at store (cancel was too late)\nT=4  Webhook: payment succeeded\n\nSOLUTION:\n\u2022 Cancel API call may fail \u2192 if it fails, DON'T update order status\n\u2022 Webhook always takes priority over local status\n\u2022 If CANCELLED order gets success webhook \u2192 still mark SUCCESS\n\u2022 Log CRITICAL alert for manual review\n\u2022 Rule: If money was collected, always honor it"
      },
      {
        id: "state-machine",
        title: "State Machine",
        type: "text",
        intro: "Order status transitions",
        content: "PREPARED \u2192 PENDING \u2192 SUCCESS (terminal)\n              \u2193\n           FAILED (terminal)\n\nSpecial transitions:\n\u2022 PENDING \u2192 PREPARED (switch method \u2014 same order)\n\u2022 PENDING \u2192 CANCELLED (user abandons)\n\u2022 CANCELLED \u2192 SUCCESS (race condition \u2014 honor payment)\n\nKey Rules:\n\u2022 FAILED = terminal (create new order to retry)\n\u2022 CANCELLED \u2192 SUCCESS = rare but must be handled\n\u2022 PENDING \u2192 PREPARED = \"switch method\" transition"
      },
      {
        id: "api-endpoints",
        title: "New API Endpoints",
        type: "endpoints",
        intro: "5 new endpoints",
        items: [
          { method: "GET", path: "/api/orders/pending", desc: "Check pending order" },
          { method: "POST", path: "/api/orders", desc: "Create order" },
          { method: "GET", path: "/api/orders/{id}/status", desc: "Poll status" },
          { method: "POST", path: "/api/orders/{id}/pay", desc: "Create payment session" },
          { method: "POST", path: "/api/orders/{id}/cancel-payment", desc: "Cancel payment" }
        ]
      },
      {
        id: "frontend",
        title: "Two New Frontend Components",
        type: "two-col",
        left: { title: "PendingOrderDialog (Modal)", items: ["Appears before checkout when pending order found", "Shows: resume, view voucher, or cancel & switch", "Quick interceptor \u2014 no page navigation needed"] },
        right: { title: "/payment/:orderId (Page)", items: ["Dedicated payment status hub", "Auto-polls for payment confirmation", "Shows konbini voucher link + expiry", "Can be bookmarked and revisited", "Auto-redirects to success page when paid"] }
      },
      {
        id: "pages-components",
        title: "Pages & Components to Build",
        type: "pages-components",
        pages: [
          { name: "PaymentPage", route: "/payment/:orderId", purpose: "Payment status hub with auto-polling, voucher info, cancel/switch" },
          { name: "PendingOrderDialog", route: "(modal)", purpose: "Intercept before checkout \u2014 resume, view voucher, or cancel & switch" }
        ],
        components: [

    function initNav() {
      const navList = document.getElementById('nav-list');
      slides.forEach((slide, i) => {
        const btn = document.createElement('button');
        btn.textContent = slide.title;
        btn.onclick = () => {
          currentSlide = i;
          renderSlide(i);
        };
        if (i === 0) btn.classList.add('active');
        navList.appendChild(btn);
      });
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
        const activeBtn = document.querySelectorAll('#nav-list button')[currentSlide];
        if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
        const activeBtn = document.querySelectorAll('#nav-list button')[currentSlide];
        if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        previousSlide();
      }
    });

    initNav();
    renderSlide(0);
  </script>
</body>
</html>
